version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_DISABLE_AUTH=true
    depends_on:
      - backend

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./server/.env
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
